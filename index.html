<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cesium Asset Viewer</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        html, body, #cesiumContainer {
            width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
        }
        
        #toolbar {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(42, 42, 42, 0.9);
            padding: 15px;
            border-radius: 8px;
            z-index: 1000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #toolbar h3 {
            margin: 0 0 15px 0;
            color: #48b;
            font-size: 18px;
        }
        
        #info {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(42, 42, 42, 0.9);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 12px;
            max-width: 300px;
            z-index: 1000;
        }
        
        .loading {
            color: #ffa500;
            animation: pulse 1.5s ease-in-out infinite alternate;
        }
        
        @keyframes pulse {
            from { opacity: 0.6; }
            to { opacity: 1; }
        }
        
        .error {
            color: #ff6b6b;
        }
        
        .success {
            color: #51cf66;
        }
        
        .controls {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #666;
        }
        
        .control-button {
            margin: 5px 5px 5px 0;
            padding: 6px 12px;
            border: none;
            background: #666;
            color: white;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
        }
        
        .control-button:hover {
            background: #777;
        }
        
        .control-button.primary {
            background: #48b;
        }
        
        .control-button.primary:hover {
            background: #369;
        }
    </style>
</head>

        async function initializeCesium() {
            try {
                // Grant CesiumJS access to your ion assets
                viewer = new Cesium.Viewer('cesiumContainer', {
                    terrainProvider: await Cesium.CesiumTerrainProvider.fromIonAssetId(1)
                });
                viewer.scene.globe.depthTestAgainstTerrain = true;
                
                initializeViewer();
            } catch (error) {
                console.error('Cesium 초기화 오류:', error);
                // 기본 설정으로 폴백
                viewer = new Cesium.Viewer('cesiumContainer', {
                    terrainProvider: new Cesium.EllipsoidTerrainProvider()
                });
                initializeViewer();
            }
        }
        
        function initializeViewer() {
            // 카메라 정보 업데이트
            viewer.camera.changed.addEventListener(updateCameraInfo);
            
            // 초기 뷰 설정 (전 세계 뷰)
            viewer.camera.setView({
                destination: Cesium.Cartesian3.fromDegrees(0, 0, 20000000)
            });
            
            updateCameraInfo();
            
            // Asset ID 3715158 자동 로드
            loadInitialAsset();
            
            console.log('Cesium Asset Viewer가 준비되었습니다!');
        }
        
        // 초기 에셋 로드 함수
        async function loadInitialAsset() {
            try {
                showLoadingState('Asset 3715158 로딩 중...');
                
                const tileset = await Cesium.Cesium3DTileset.fromIonAssetId(3715158);
                viewer.scene.primitives.add(tileset);
                await viewer.zoomTo(tileset);
                
                // Apply the default style if it exists
                const extras = tileset.asset.extras;
                if (
                    Cesium.defined(extras) &&
                    Cesium.defined(extras.ion) &&
                    Cesium.defined(extras.ion.defaultStyle)
                ) {
                    tileset.style = new Cesium.Cesium3DTileStyle(extras.ion.defaultStyle);
                }
                
                currentAssets.push(tileset);
                showSuccessState('Asset 3715158 로드 완료');
                updateAssetInfo('Asset 3715158', 'Cesium Ion Asset', '3D Tileset');
                
            } catch (error) {
                console.error('Asset 3715158 로드 오류:', error);
                showErrorState(`Asset 3715158 로드 실패: ${error.message}`);
            }
        }
